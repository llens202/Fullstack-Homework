<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Таблиця в стилі Мондріана</title>
    <style>
        table {
            border-collapse: collapse;
            width: 400px;
            height: 450px;
            border: 5px solid black;
            background-color: white;
        }
        td {
            border: 5px solid black;
        }
        .red {background-color: red;}
        .blue{background-color: blue;}
        .yellow {background-color: yellow;}
        .black {background-color: black;}
    </style>
</head>
<body>
    <table>
        <tr>
            <td width="30%" height="10%" colspan="2">1.1</td>
        
            <td width="40%">3.1</td>
            <td width="30%">4.1</td>
            <td width="10" rowspan="4">5.1</td>
        </tr>
        <tr>
            <td>1.2</td>
            <td rowspan="2" colspan="2" class="red">2.2</td>
            <td class="yellow">4.2</td>
          
        </tr>
        <tr>
            <td rowspan="2">1.3</td>
            <td>4.3</td>
        
        </tr>
        <tr>
            
            <td>2.4</td>
            <td>3.4</td>
            <td>4.4</td>
           
        </tr>
        <tr>
            <td>1.5</td>
            <td>2.5</td>
            <td>3.5</td>
            <td>4.5</td>
            <td>5.5</td>
        </tr>
    </table>

    

</body>
</html>
