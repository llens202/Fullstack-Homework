<!DOCTYPE html>
<html>
<head>
<style>
  table {
            border-collapse: collapse;
            width: 500px;
            height: 500px;
            border: 5px solid black;
            background-color: white;
            table-layout: fixed;
        }
       td {
    padding: 0;
    border: 3px solid black; /* Чтобы границы ячеек тоже были видны */
    box-sizing: border-box; /* Это критично! Чтобы границы не раздували ячейку */
}

        .red {background-color: red;}
        .blue{background-color: blue;}
        .yellow {background-color: yellow;}
        .black {background-color: black;}
</style>
</head>
<body>
<table>
  <tr>
    <td colspan="2">1.1</td>
    <td colspan="3">1.3</td>
    <td colspan="3">1.6</td>
    <td rowspan="6">1.9</td>
  </tr>
  <tr>
    <td rowspan="2">2.1</td>
    <td colspan="4" rowspan="4">2.2</td>
    <td colspan="3" rowspan="2">2.6</td>
  </tr>
  <tr>
  </tr>
  <tr>
    <td rowspan="3">4.1</td>
    <td colspan="2" rowspan="2">4.6</td>
    <td rowspan="2">4.8</td>
  </tr>
  <tr>
  </tr>
  <tr>
    <td colspan="2" rowspan="2">6.2</td>
    <td colspan="2">6.4</td>
    <td colspan="3">6.6</td>
  </tr>
  <tr>
    <td rowspan="3">7.1</td>
    <td colspan="2">7.4</td>
    <td colspan="3" rowspan="2">7.6</td>
    <td rowspan="3">7.9</td>
  </tr>
  <tr>
    <td colspan="2" rowspan="2">8.2</td>
    <td colspan="2">8.4</td>
  </tr>
  <tr>
    <td colspan="5">9.4</td>  
  </tr>
</table>


</body>
</html>
