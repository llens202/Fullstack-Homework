<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        table {
            border-collapse: collapse;
            width: 400px;
            height: 450px;
            border: 5px solid black;
            background-color: white;
            table-layout: fixed;
        }
       td {
    padding: 0;
    border: 3px solid black; /* Чтобы границы ячеек тоже были видны */
    box-sizing: border-box; /* Чтобы границы не раздували ячейку */

       }
        .red {background-color: red;}
        .blue{background-color: blue;}
        .yellow {background-color: yellow;}
        .black {background-color: black;}
    </style>

</head>
<body>
    <table>
         <tr>
            <td colspan="3" rowspan="2">1.1</td>
            <td colspan="4" rowspan="2">1.4</td>
            <td colspan="4" rowspan="2" class="yellow">1.8</td>
            <td rowspan="8">1.12</td>
        </tr>
         <tr>
        </tr>
         <tr>
            <td rowspan="2">3.1</td>
            <td colspan="6" rowspan="5" class="red">3.2</td>
            <td colspan="4" rowspan="2" class="yellow">3.8</td>   
         <tr>
        </tr>
         <tr>
            <td rowspan="4">5.1</td>
            <td colspan="2" rowspan="3">5.8</td>
            <td colspan="2" rowspan="3">5.10</td>
        </tr>
         <tr>
        </tr>
         <tr>
        </tr>
         <tr>
            <td colspan="3" rowspan="3" class="black">8.2</td>
            <td colspan="3">8.5</td>
            <td colspan="4">8.8</td>
        </tr>
         <tr>
            <td rowspan="4" class="yellow">9.1</td>
            <td colspan="3" rowspan="2">9.5</td>
            <td colspan="4" rowspan="3" class="blue">9.8</td>
            <td rowspan="4" class="red">9.12</td>
        </tr>
         <tr>
        </tr>
         <tr>
            <td colspan="3" rowspan="2">11.2</td> 
            <td colspan="3" class="black">11.5</td>        
        </tr>
         <tr>
            <td colspan="7">12.5</td>
            
            
     </tr>
    
</body>
</html>
